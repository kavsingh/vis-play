pre-commit:
  parallel: true
  jobs:
    - run: bun oxlint --type-aware --type-check --max-warnings=0 {staged_files}
      root: "apps/vis"
      glob: "**/*.{ts,tsx,js,jsx}"
    - run: bun oxfmt --no-error-on-unmatched-pattern {staged_files}
      root: "apps/vis"
      glob: "**/*.{ts,tsx,js,jsx,json,jsonc,yaml,yml,html,css}"
      stage_fixed: true
    - run: bun tombi format {staged_files}
      root: "apps/vis"
      glob: "**/*.toml"
      stage_fixed: true
